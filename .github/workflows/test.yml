name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'

jobs:
  setup:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache/save@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  lint:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm run check:arch:backend:side-effects
      - run: pnpm run lint
      - run: pnpm run typecheck

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm run test:unit
        env:
          NODE_ENV: test
          PORT: 3333
          HOST: 0.0.0.0
          APP_URL: http://localhost:3333
          APP_KEY: test-key-at-least-16-chars-long
          APP_NAME: Suar
          APP_LOCALE: vi
          APP_TIMEZONE: Asia/Ho_Chi_Minh
          LOG_LEVEL: silent
          SESSION_DRIVER: memory
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: root
          PG_PASSWORD: ''
          PG_DATABASE: suar_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          LOCK_STORE: memory

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: ''
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: suar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U root"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm run db:test:migrate
        env:
          PG_TEST_DATABASE: suar_test
      - run: pnpm run test:integration:safe
        env:
          NODE_ENV: test
          PORT: 3333
          HOST: 0.0.0.0
          APP_URL: http://localhost:3333
          APP_KEY: test-key-at-least-16-chars-long
          APP_NAME: Suar
          APP_LOCALE: vi
          APP_TIMEZONE: Asia/Ho_Chi_Minh
          LOG_LEVEL: silent
          SESSION_DRIVER: memory
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: root
          PG_PASSWORD: ''
          PG_DATABASE: suar_test
          PG_TEST_DATABASE: suar_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          LOCK_STORE: memory

  test-component:
    name: Component Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm run test:component

  test-architecture:
    name: Architecture Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm run test:architecture

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-integration, test-component]
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm run test:e2e
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build:
    name: Build & Docker
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, test-component, test-architecture]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm run build
        env:
          NODE_ENV: production
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: suar:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Summary
        run: |
          echo "CI completed successfully!"
          echo "Image: suar:${{ github.sha }}"
