# ==============================================================================
# GitHub Actions CI Pipeline
# ==============================================================================
#
# KIẾN TRÚC:
#
#   ┌──────────────────┐
#   │   setup (shared)  │  Install + cache deps
#   └──────┬───────────┘
#          │
#   ┌──────┴──────┬──────────────┬────────────┐
#   │  lint       │  test:unit   │test:integ  │  (song song)
#   └──────┬──────┴──────────────┴────────────┘
#          │
#   ┌──────┴───────────┐
#   │   build + docker  │
#   └──────────────────┘
#
# ==============================================================================

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  # ===========================================================================
  # Job 1: Install & cache dependencies
  # ===========================================================================
  setup:
    name: 📦 Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ===========================================================================
  # Job 2: Lint + TypeCheck
  # ===========================================================================
  lint:
    name: 🔍 Lint & TypeCheck
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Check backend side-effect boundary
        run: pnpm run check:arch:backend:side-effects

      - run: pnpm run lint
      - run: pnpm run typecheck

  # ===========================================================================
  # Job 3-4: Tests (chạy song song 2 suite)
  # ===========================================================================
  test-unit:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Run unit tests
        run: pnpm test:unit
        env:
          NODE_ENV: test
          PORT: 3333
          HOST: 0.0.0.0
          APP_URL: http://localhost:3333
          APP_KEY: test-key-at-least-16-chars-long
          APP_NAME: Suar
          APP_LOCALE: vi
          APP_TIMEZONE: Asia/Ho_Chi_Minh
          LOG_LEVEL: silent
          SESSION_DRIVER: memory
          DB_CONNECTION: pg
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: root
          DB_PASSWORD: ''
          DB_DATABASE: suar_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          LOCK_STORE: memory

  test-integration:
    name: 🧪 Integration Tests
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: ''
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: suar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U root"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Setup test database
        run: |
          PGPASSWORD='' psql -h localhost -U root -d suar_test -f docs/refactordb/suar_postgresql_v3.sql || true

      - name: Run integration tests
        run: pnpm test:integration
        env:
          NODE_ENV: test
          PORT: 3333
          HOST: 0.0.0.0
          APP_URL: http://localhost:3333
          APP_KEY: test-key-at-least-16-chars-long
          APP_NAME: Suar
          APP_LOCALE: vi
          APP_TIMEZONE: Asia/Ho_Chi_Minh
          LOG_LEVEL: silent
          SESSION_DRIVER: memory
          DB_CONNECTION: pg
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: root
          DB_PASSWORD: ''
          DB_DATABASE: suar_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          LOCK_STORE: memory

  # ===========================================================================
  # Job 6: Build + Docker (chỉ chạy khi tất cả test pass)
  # ===========================================================================
  build:
    name: 🏗️ Build & Docker
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: suar:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===== SUMMARY =====
      - name: ✅ Summary
        run: |
          echo "🎉 CI completed successfully!"
          echo "📦 Image: suar:${{ github.sha }}"
          echo "⏱️ Target: 2-3 minutes"
